# RCC — Rocky Command Center
# docker compose up    → starts the full stack
# docker compose up -d → detached
#
# First run: make init-rcc (generates config in ./rcc-data/)
#
# See GETTING_STARTED.md for the full operator walkthrough.
#
# Notes:
# - rcc-data/ is a bind-mount dir created by make init-rcc (contains .env + runtime data)
# - squirrelchat-data/ is a bind-mount dir for the SQLite database
# - logs/ is a shared bind-mount for all service logs
# - The WASM dashboard dist is bind-mounted from rcc/dashboard/dist/ (pre-built, committed to repo)

services:

  # ── RCC API ──────────────────────────────────────────────────────────────
  rcc-api:
    image: ${RCC_IMAGE:-ghcr.io/jordanhubbard/rcc:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcc-api
    restart: unless-stopped
    env_file:
      - ./rcc-data/.env          # generated by make init-rcc
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data/rcc
      - QUEUE_PATH=/data/rcc/queue.json
      - EXEC_LOG_PATH=/data/rcc/exec-log.jsonl
    ports:
      - "${RCC_PORT:-8789}:8789"
    volumes:
      - ./rcc-data:/data/rcc     # persistent queue + agent registry + secrets
      - ./logs:/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rcc-net

  # ── SquirrelChat ──────────────────────────────────────────────────────────
  # Node.js/Express backend — the portable version for Docker deployment.
  # (The Rust/Axum version in rcc/dashboard/squirrelchat-server/ is for
  #  native bare-metal installs with full WASM dashboard integration.)
  squirrelchat:
    image: ${RCC_IMAGE:-ghcr.io/jordanhubbard/rcc:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squirrelchat
    restart: unless-stopped
    command: ["node", "squirrelchat/server.mjs"]
    env_file:
      - ./rcc-data/.env
    environment:
      - NODE_ENV=production
      - SC_DB_PATH=/data/squirrelchat/squirrelchat.db
      - SC_PORT=8790
    ports:
      - "${SC_PORT:-8790}:8790"
    volumes:
      - ./squirrelchat-data:/data/squirrelchat  # SQLite database persistence
      - ./logs:/data/logs
    depends_on:
      rcc-api:
        condition: service_healthy
    networks:
      - rcc-net

  # ── Dashboard (WASM static) ───────────────────────────────────────────────
  # Serves the pre-built Leptos/WASM frontend from rcc/dashboard/dist/.
  # The dist/ is committed to the repo and kept current by the wasm-build CI workflow.
  # Proxies /api and /bus (SSE) to rcc-api.
  dashboard:
    image: nginx:alpine
    container_name: rcc-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8788}:80"
    volumes:
      - ./rcc/dashboard/dist:/usr/share/nginx/html:ro        # pre-built WASM dist
      - ./deploy/nginx/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rcc-api
    networks:
      - rcc-net

networks:
  rcc-net:
    driver: bridge

# NOTE: No named volumes defined here — all persistence uses bind mounts
# (./rcc-data, ./squirrelchat-data, ./logs) so operators can easily inspect
# and back up their data without docker volume commands.
