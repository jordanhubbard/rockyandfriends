# ACC — Agent Coordination Center
# docker compose up    → starts the full stack
# docker compose up -d → detached
#
# First run: make init (generates config in ~/.acc/.env)
#
# See GETTING_STARTED.md for the full operator walkthrough.
#
# Notes:
# - acc-data/ is a bind-mount dir for runtime data (queue, registry, secrets)
# - logs/ is a shared bind-mount for all service logs
#
# Override ACC_OWNER/ACC_REPO to use your own fork:
#   ACC_OWNER=myorg ACC_REPO=my-acc docker compose up

services:

  # ── ACC API (Rust/Axum) ────────────────────────────────────────────────
  acc-api:
    image: ${ACC_IMAGE:-ghcr.io/${ACC_OWNER:-jordanhubbard}/acc:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acc-api
    restart: unless-stopped
    env_file:
      - ./acc-data/.env          # generated by make init
    environment:
      - DATA_DIR=/data/acc
      - QUEUE_PATH=/data/acc/queue.json
      - EXEC_LOG_PATH=/data/acc/exec-log.jsonl
    ports:
      - "${ACC_PORT:-8789}:8789"
    volumes:
      - ./acc-data:/data/acc     # persistent queue + agent registry + secrets
      - ./logs:/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - acc-net

  # ── Dashboard (WASM static) ────────────────────────────────────────────
  # Serves the pre-built Leptos/WASM frontend from dist/.
  # The dist/ is committed to the repo and kept current by the wasm-build CI workflow.
  # Proxies /api and /bus (SSE) to acc-api.
  dashboard:
    image: nginx:alpine
    container_name: acc-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8788}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro                      # pre-built WASM dist
      - ./deploy/nginx/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - acc-api
    networks:
      - acc-net

  # Hermes gateway is no longer a vendored Docker service. Run the native
  # agent runtime on a registered node instead:
  #   ~/.acc/bin/acc-agent hermes --gateway
  # or, after install:
  #   ~/.acc/bin/hermes --gateway

networks:
  acc-net:
    driver: bridge

# NOTE: No named volumes defined here — all persistence uses bind mounts
# (./acc-data, ./logs) so operators can easily inspect and back up their
# data without docker volume commands.
