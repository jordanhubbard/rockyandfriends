# CCC — Rocky Command Center
# docker compose up    → starts the full stack
# docker compose up -d → detached
#
# First run: make init-ccc (generates config in ./ccc-data/)
#
# See GETTING_STARTED.md for the full operator walkthrough.
#
# Notes:
# - ccc-data/ is a bind-mount dir created by make init-ccc (contains .env + runtime data)
# - squirrelchat-data/ is a bind-mount dir for the SQLite database
# - logs/ is a shared bind-mount for all service logs
# - The WASM dashboard dist is bind-mounted from.ccc/dashboard/dist/ (pre-built, committed to repo)

services:

  # ── CCC API ──────────────────────────────────────────────────────────────
  ccc-api:
    image: ${CCC_IMAGE:-ghcr.io/jordanhubbard/ccc:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccc-api
    restart: unless-stopped
    env_file:
      - ./ccc-data/.env          # generated by make init-ccc
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data/ccc
      - QUEUE_PATH=/data.ccc/queue.json
      - EXEC_LOG_PATH=/data.ccc/exec-log.jsonl
    ports:
      - "${CCC_PORT:-8789}:8789"
    volumes:
      - ./ccc-data:/data/ccc     # persistent queue + agent registry + secrets
      - ./logs:/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ccc-net

  # ── ClawChat ───────────────────────────────────────────────────────────
  # Node.js/Express backend — the portable version for Docker deployment.
  # (The Rust/Axum version in.ccc/dashboard/clawchat-server/ is for
  #  native bare-metal installs with full WASM dashboard integration.)
  clawchat:
    image: ${CCC_IMAGE:-ghcr.io/jordanhubbard/ccc:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawchat
    restart: unless-stopped
    command: ["node", "clawchat/server.mjs"]
    env_file:
      - ./ccc-data/.env
    environment:
      - NODE_ENV=production
      - SC_DB_PATH=/data/clawchat/clawchat.db
      - SC_PORT=8790
    ports:
      - "${SC_PORT:-8790}:8790"
    volumes:
      - ./clawchat-data:/data/clawchat  # SQLite database persistence
      - ./logs:/data/logs
    depends_on:
      ccc-api:
        condition: service_healthy
    networks:
      - ccc-net

  # ── Dashboard (WASM static) ───────────────────────────────────────────────
  # Serves the pre-built Leptos/WASM frontend from.ccc/dashboard/dist/.
  # The dist/ is committed to the repo and kept current by the wasm-build CI workflow.
  # Proxies /api and /bus (SSE) to ccc-api.
  dashboard:
    image: nginx:alpine
    container_name: ccc-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8788}:80"
    volumes:
      - ..ccc/dashboard/dist:/usr/share/nginx/html:ro        # pre-built WASM dist
      - ./deploy/nginx/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ccc-api
    networks:
      - ccc-net

networks:
  ccc-net:
    driver: bridge

# NOTE: No named volumes defined here — all persistence uses bind mounts
# (./ccc-data, ./clawchat-data, ./logs) so operators can easily inspect
# and back up their data without docker volume commands.
