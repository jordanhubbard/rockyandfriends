name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Run CCC API tests
        run: |
          cd.ccc/tests
          for f in $(find . -name '*.test.mjs' -not -path '*/gpu/*' -not -path '*/integration*'); do
            echo "::group::$f"
            node --test "$f" || echo "::warning::$f failed"
            echo "::endgroup::"
          done

      - name: Run ClawFS tests
        run: node --test services/clawfs/clawfs.test.mjs || echo "::warning::ClawFS tests failed"

  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:.ccc/dashboard/ccc-server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces:.ccc/dashboard/ccc-server

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

  rust-wasm:
    name: WASM Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:.ccc/dashboard/dashboard-ui
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces:.ccc/dashboard/dashboard-ui

      - name: Install trunk
        run: cargo install trunk --locked || true

      - name: cargo check (wasm)
        run: cargo check --target wasm32-unknown-unknown
