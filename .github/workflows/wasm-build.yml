name: WASM Dashboard Build (sparky aarch64)

on:
  push:
    branches: [main]
    paths:
      - 'rcc/dashboard/**'
      - '.github/workflows/wasm-build.yml'
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: wasm-build-${{ github.ref }}
  cancel-in-progress: true  # cancel stale build if new push arrives

jobs:
  build-wasm-aarch64:
    name: Build WASM on sparky (aarch64 GB10)
    runs-on: ubuntu-latest
    environment: CI_ACTIONS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CI path: runner -> do-host1 (ROCKY_HOST) -> 127.0.0.1:2222 -> sparky sshd
      # sparky's GlobalProtect VPN blocks all inbound TCP to :22.
      # Fix: persistent reverse SSH tunnel from sparky -> do-host1 exposes :2222.
      - name: Set up SSH keys and ProxyJump config
        env:
          ROCKY_HOST: ${{ secrets.ROCKY_HOST }}
          ROCKY_SSH_KEY: ${{ secrets.ROCKY_SSH_KEY }}
          SPARKY_SSH_KEY: ${{ secrets.SPARKY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ROCKY_SSH_KEY" > ~/.ssh/rocky_key
          printf '%s\n' "$SPARKY_SSH_KEY" > ~/.ssh/sparky_key
          chmod 600 ~/.ssh/rocky_key ~/.ssh/sparky_key
          cat >> ~/.ssh/config << EOF
          Host do-host1
            HostName $ROCKY_HOST
            User jkh
            IdentityFile ~/.ssh/rocky_key
            StrictHostKeyChecking no
            ConnectTimeout 15
          Host sparky-tunnel
            HostName 127.0.0.1
            Port 2222
            User jkh
            IdentityFile ~/.ssh/sparky_key
            StrictHostKeyChecking no
            ConnectTimeout 30
            ProxyJump do-host1
          EOF
          ssh do-host1 "echo 'Rocky: OK'"
          ssh sparky-tunnel "echo 'sparky: OK via reverse tunnel'"

      - name: Run build on sparky
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh sparky-tunnel "
            set -euo pipefail
            export PATH=\"\$HOME/.cargo/bin:\$HOME/.local/bin:\$PATH\"
            source \"\$HOME/.cargo/env\"
            echo '=== sparky WASM build ==='
            echo 'Rust:' \$(rustc --version)
            echo 'trunk:' \$(trunk --version)
            echo 'sccache:' \$(sccache --version)
            cd \$HOME/.openclaw/workspace
            git fetch origin main
            git checkout $GITHUB_SHA -- rcc/dashboard/
            cd rcc/dashboard/dashboard-ui
            RUSTC_WRAPPER=sccache trunk build --release
            echo '=== Build complete ==='
            du -sh ../dist/
          "

      - name: Package and publish dist artifact to MinIO
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh sparky-tunnel "
            set -euo pipefail
            DIST=\"\$HOME/.openclaw/workspace/rcc/dashboard/dist\"
            TARBALL=\"/tmp/wasm-dist-$GITHUB_SHA.tar.gz\"
            tar -czf \"\$TARBALL\" -C \"\$DIST\" .
            echo \"Artifact: \$(du -sh \$TARBALL)\"
            curl -sf -X PUT \
              -H 'Content-Type: application/octet-stream' \
              --data-binary @\"\$TARBALL\" \
              'http://100.89.199.14:9000/agents/natasha/wasm-dist-latest.tar.gz' \
              -u 'rocky2197fb96dde4618aa17f:e47696ac5fcd998be6f342bbc47d13bf5f2fcaebae0ba3e1'
            curl -sf -X PUT \
              -H 'Content-Type: application/octet-stream' \
              --data-binary @\"\$TARBALL\" \
              'http://100.89.199.14:9000/agents/natasha/wasm-dist-$GITHUB_SHA.tar.gz' \
              -u 'rocky2197fb96dde4618aa17f:e47696ac5fcd998be6f342bbc47d13bf5f2fcaebae0ba3e1'
            echo 'Published to MinIO'
          "

      - name: Run dashboard-server unit tests on sparky
        run: |
          ssh sparky-tunnel "
            set -euo pipefail
            export PATH=\"\$HOME/.cargo/bin:\$PATH\"
            source \"\$HOME/.cargo/env\"
            cd \$HOME/.openclaw/workspace/rcc/dashboard
            cargo test --package dashboard-server 2>&1 | tail -5
          "
