name: WASM Dashboard Build (sparky aarch64)

on:
  push:
    branches: [main]
    paths:
      - 'rcc/dashboard/**'
      - '.github/workflows/wasm-build.yml'
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: wasm-build-${{ github.ref }}
  cancel-in-progress: true  # cancel stale build if new push arrives

jobs:
  build-wasm-aarch64:
    name: Build WASM on sparky (aarch64 GB10)
    runs-on: ubuntu-latest   # orchestrator — actual build runs on sparky via SSH
    environment: CI_ACTIONS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Route: CI runner joins tailnet → ssh via `tailscale nc` ProxyCommand → sparky:22
      #
      # Why tailscale nc:
      # sparky has GlobalProtect VPN (gpd0) with policy routing rules (pangp.include
      # at priority 5209) that sit above Tailscale's table 52 (priority 5270).
      # Kernel TCP to sparky's Tailscale IP times out. But `tailscale nc` uses
      # Tailscale's userspace path, completely bypassing the kernel routing table.
      # No ProxyJump through Rocky needed — direct userspace tunnel.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: "--ephemeral --accept-routes"

      - name: Wait for Tailscale to be ready
        run: |
          echo "Waiting for Tailscale to be fully connected..."
          for i in $(seq 1 30); do
            if tailscale status --json | jq -e '.Self.Online' > /dev/null 2>&1; then
              echo "Tailscale is online (attempt $i)"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          tailscale status
          echo "Testing tailscale nc to sparky (100.87.229.125:22)..."
          timeout 15 tailscale nc 100.87.229.125 22 < /dev/null | head -c 100 || true
          echo ""
          echo "tailscale nc test complete"

      - name: Set up SSH keys
        env:
          SPARKY_SSH_KEY: ${{ secrets.SPARKY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SPARKY_SSH_KEY" > ~/.ssh/sparky_key
          chmod 600 ~/.ssh/sparky_key

          cat >> ~/.ssh/config << 'EOF'
          Host sparky
            HostName 100.87.229.125
            User jkh
            IdentityFile ~/.ssh/sparky_key
            StrictHostKeyChecking no
            ConnectTimeout 30
            ProxyCommand tailscale nc %h %p
          EOF

          # Verify connection
          ssh sparky "echo 'sparky: OK via tailscale nc'"

      - name: Run build on sparky
        run: |
          ssh sparky << 'REMOTE'
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          source "$HOME/.cargo/env"

          echo "=== sparky WASM build ==="
          echo "Rust: $(rustc --version)"
          echo "trunk: $(trunk --version)"
          echo "sccache: $(sccache --version)"

          cd ~/.openclaw/workspace
          git fetch origin main
          git checkout $GITHUB_SHA -- rcc/dashboard/

          cd rcc/dashboard/dashboard-ui
          RUSTC_WRAPPER=sccache trunk build --release 2>&1

          echo "=== Build complete ==="
          du -sh ../dist/
          REMOTE
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Package and publish dist artifact to MinIO
        run: |
          ssh sparky TARBALL="/tmp/wasm-dist-${{ github.sha }}.tar.gz" << 'REMOTE'
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          DIST="$HOME/.openclaw/workspace/rcc/dashboard/dist"
          tar -czf "$TARBALL" -C "$DIST" .
          echo "Artifact: $(du -sh $TARBALL)"

          python3 << 'PYEOF'
          import urllib.request, hmac, hashlib, datetime, os, sys

          tarball = os.environ["TARBALL"]
          payload = open(tarball, "rb").read()

          endpoint = "http://100.89.199.14:9000"
          access_key = "rocky2197fb96dde4618aa17f"
          secret_key = "e47696ac5fcd998be6f342bbc47d13bf5f2fcaebae0ba3e1"
          bucket = "agents"
          sha = "${{ github.sha }}"
          keys = ["natasha/wasm-dist-latest.tar.gz", f"natasha/wasm-dist-{sha}.tar.gz"]

          def sign(k, msg):
              return hmac.new(k, msg.encode(), hashlib.sha256).digest()
          def get_key(secret, date, region, service):
              return sign(sign(sign(sign(("AWS4"+secret).encode(), date), region), service), "aws4_request")

          def put_object(k, data):
              now = datetime.datetime.utcnow()
              amz_date = now.strftime("%Y%m%dT%H%M%SZ")
              date_stamp = now.strftime("%Y%m%d")
              region, service = "us-east-1", "s3"
              host = "100.89.199.14:9000"
              content_type = "application/gzip"
              payload_hash = hashlib.sha256(data).hexdigest()
              canon_headers = f"content-type:{content_type}\nhost:{host}\nx-amz-content-sha256:{payload_hash}\nx-amz-date:{amz_date}\n"
              signed_headers = "content-type;host;x-amz-content-sha256;x-amz-date"
              canon_req = f"PUT\n/{bucket}/{k}\n\n{canon_headers}\n{signed_headers}\n{payload_hash}"
              cred_scope = f"{date_stamp}/{region}/{service}/aws4_request"
              string_to_sign = f"AWS4-HMAC-SHA256\n{amz_date}\n{cred_scope}\n{hashlib.sha256(canon_req.encode()).hexdigest()}"
              sig_key = get_key(secret_key, date_stamp, region, service)
              sig = hmac.new(sig_key, string_to_sign.encode(), hashlib.sha256).hexdigest()
              auth = f"AWS4-HMAC-SHA256 Credential={access_key}/{cred_scope}, SignedHeaders={signed_headers}, Signature={sig}"
              req = urllib.request.Request(f"{endpoint}/{bucket}/{k}", data=data, method="PUT")
              req.add_header("Content-Type", content_type)
              req.add_header("x-amz-date", amz_date)
              req.add_header("x-amz-content-sha256", payload_hash)
              req.add_header("Authorization", auth)
              urllib.request.urlopen(req)
              print(f"Published: {k} ({len(data)} bytes)")

          for k in keys:
              put_object(k, payload)
          PYEOF
          REMOTE

      - name: Run dashboard-server unit tests on sparky
        run: |
          ssh sparky << 'REMOTE'
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          source "$HOME/.cargo/env"
          cd ~/.openclaw/workspace/rcc/dashboard
          cargo test --package dashboard-server 2>&1 | tail -5
          REMOTE
