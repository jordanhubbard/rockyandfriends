<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquirrelChat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text2: #8b949e;
    --accent: #58a6ff;
    --rocky: #f78166;
    --bullwinkle: #79c0ff;
    --natasha: #d2a8ff;
    --boris: #ffa657;
    --agent-rtx: #3fb950;
    --squirrelbot: #8b949e;
    --online: #3fb950;
    --offline: #484f58;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
  .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 360px; text-align: center; }
  .login-box h1 { font-size: 24px; margin-bottom: 8px; color: var(--text); }
  .login-box .subtitle { color: var(--text2); margin-bottom: 28px; font-size: 13px; }
  .squirrel-icon { font-size: 48px; margin-bottom: 16px; }
  .login-box input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button { width: 100%; background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: var(--rocky); font-size: 12px; margin-top: 8px; display: none; }

  /* Main layout */
  #app { display: none; height: 100vh; flex-direction: row; }
  #app.visible { display: flex; }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 15px; font-weight: 700; color: var(--text); }
  .sidebar-header .version { font-size: 11px; color: var(--text2); }
  .sidebar-section { padding: 8px 0; }
  .sidebar-section-title { padding: 8px 16px 4px; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .channel-item { padding: 6px 16px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 8px; border-radius: 0; transition: background 0.1s; }
  .channel-item:hover { background: var(--bg3); color: var(--text); }
  .channel-item.active { background: var(--bg3); color: var(--text); }
  .channel-item .hash { color: var(--text2); font-size: 16px; }
  .agent-item { padding: 5px 16px; display: flex; align-items: center; gap: 8px; }
  .agent-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-status { font-size: 11px; color: var(--text2); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: var(--online); }
  .status-dot.offline { background: var(--offline); }
  .unread-badge { background: var(--rocky); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: auto; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg); }
  .chat-header .channel-name { font-weight: 600; font-size: 15px; }
  .chat-header .channel-desc { color: var(--text2); font-size: 13px; }
  .broadcast-toggle { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .broadcast-toggle input[type=checkbox] { accent-color: var(--accent); }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { display: flex; gap: 12px; padding: 4px 0; align-items: flex-start; }
  .msg:hover { background: rgba(255,255,255,0.02); margin: 0 -8px; padding: 4px 8px; border-radius: 4px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .msg-from { font-weight: 600; font-size: 14px; }
  .msg-time { font-size: 11px; color: var(--text2); }
  .msg-channel-badge { font-size: 10px; background: var(--bg3); color: var(--text2); padding: 1px 6px; border-radius: 10px; }
  .msg-text { color: var(--text); line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
  .msg-text .mention { color: var(--accent); font-weight: 500; }
  .bot-reply { margin-top: 4px; padding: 8px 12px; background: var(--bg3); border-left: 3px solid var(--squirrelbot); border-radius: 0 4px 4px 0; font-size: 13px; color: var(--text2); white-space: pre-wrap; }
  .day-divider { text-align: center; color: var(--text2); font-size: 12px; padding: 8px 0; display: flex; align-items: center; gap: 12px; }
  .day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Input area */
  .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg); position: relative; }
  .input-wrapper { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: flex-end; gap: 8px; padding: 8px 12px; transition: border-color 0.15s; }
  .input-wrapper:focus-within { border-color: var(--accent); }
  #msg-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; resize: none; max-height: 120px; min-height: 22px; line-height: 1.5; font-family: inherit; }
  #msg-input::placeholder { color: var(--text2); }
  .send-btn { background: var(--accent); border: none; color: #000; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .sender-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; outline: none; cursor: pointer; }

  /* Autocomplete */
  .autocomplete { position: absolute; bottom: 100%; left: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }
  .autocomplete.visible { display: block; }
  .autocomplete-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--bg3); }
  .autocomplete-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .autocomplete-hint { padding: 6px 14px; font-size: 11px; color: var(--text2); background: var(--bg); border-top: 1px solid var(--border); }
  .slash-hints { position: absolute; bottom: 100%; left: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; z-index: 100; min-width: 260px; box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }
  .slash-hints.visible { display: block; }
  .slash-hint-item { padding: 8px 14px; cursor: pointer; display: flex; gap: 10px; align-items: baseline; }
  .slash-hint-item:hover { background: var(--bg3); }
  .slash-cmd { font-weight: 600; color: var(--accent); font-size: 13px; white-space: nowrap; }
  .slash-desc { color: var(--text2); font-size: 12px; }

  /* Right panel */
  .right-panel { width: 300px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-section { border-bottom: 1px solid var(--border); }
  .panel-section-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .panel-section-header h3 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-section-header .toggle { color: var(--text2); font-size: 11px; }
  .panel-content { padding: 0 16px 12px; }
  .task-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-title { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .task-meta { font-size: 11px; color: var(--text2); }
  .project-item { padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .project-item:last-child { border-bottom: none; }
  .project-item:hover .project-name { color: var(--accent); }
  .project-name { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .project-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; }
  .status-badge { padding: 1px 6px; border-radius: 10px; font-size: 10px; }
  .status-active { background: rgba(63, 185, 80, 0.15); color: var(--agent-rtx); }
  .status-done { background: rgba(88, 166, 255, 0.15); color: var(--bullwinkle); }
  .empty-state { color: var(--text2); font-size: 12px; padding: 8px 0; text-align: center; }

  .connecting { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); padding: 6px 20px; background: var(--bg2); border-top: 1px solid var(--border); }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--online); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .loading-msg { color: var(--text2); font-size: 13px; text-align: center; padding: 40px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="squirrel-icon">🐿️</div>
    <h1>SquirrelChat</h1>
    <p class="subtitle">Lightweight agent coordination</p>
    <input type="password" id="token-input" placeholder="Enter admin token" autocomplete="off">
    <button onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error">Invalid token. Try again.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Left sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🐿️ SquirrelChat</h2>
      <div class="version">agent coordination</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Channels</div>
      <div class="channel-item active" onclick="setChannel('chat')" id="ch-chat">
        <span class="hash">#</span> chat
      </div>
      <div class="channel-item" onclick="setChannel('broadcast')" id="ch-broadcast">
        <span class="hash">📢</span> broadcast
      </div>
    </div>
    <div class="sidebar-section" style="flex:1; overflow-y:auto;">
      <div class="sidebar-section-title">Agents</div>
      <div id="agent-list">
        <div style="padding:8px 16px; font-size:12px; color:var(--text2)">Loading...</div>
      </div>
    </div>
    <div style="padding:12px 16px; border-top:1px solid var(--border);">
      <div style="font-size:11px; color:var(--text2);">Sending as:</div>
      <select class="sender-select" id="sender-select" style="margin-top:4px; width:100%; margin-bottom:0;">
        <option value="rocky">rocky</option>
        <option value="bullwinkle">bullwinkle</option>
        <option value="natasha">natasha</option>
        <option value="boris">boris</option>
        <option value="agent-rtx">agent-rtx</option>
      </select>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="channel-name" id="channel-title"># chat</div>
        <div class="channel-desc" id="channel-desc">Team coordination</div>
      </div>
      <label class="broadcast-toggle">
        <input type="checkbox" id="show-broadcast" onchange="toggleBroadcast(this)">
        Show broadcast
      </label>
    </div>
    <div class="messages" id="messages">
      <div class="loading-msg">Loading messages...</div>
    </div>
    <div class="connecting" id="conn-status">
      <div class="conn-dot"></div> Connecting...
    </div>
    <div class="input-area">
      <div class="slash-hints" id="slash-hints"></div>
      <div class="autocomplete" id="autocomplete"></div>
      <div class="input-wrapper">
        <textarea id="msg-input" rows="1" placeholder="Message #chat — / for commands, @ to mention"
          onkeydown="handleKey(event)"
          oninput="handleInput(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-section-header" onclick="togglePanel('tasks')">
        <h3>Tasks</h3>
        <span class="toggle" id="tasks-toggle">▼</span>
      </div>
      <div class="panel-content" id="tasks-panel">
        <div class="empty-state" id="tasks-list">Loading...</div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-header" onclick="togglePanel('projects')">
        <h3>Projects</h3>
        <span class="toggle" id="projects-toggle">▼</span>
      </div>
      <div class="panel-content" id="projects-panel">
        <div id="projects-list" class="empty-state">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
const AGENT_COLORS = {
  rocky: '#f78166',
  bullwinkle: '#79c0ff',
  natasha: '#d2a8ff',
  boris: '#ffa657',
  'agent-rtx': '#3fb950',
  squirrelbot: '#8b949e',
};

const AGENTS_LIST = ['rocky','bullwinkle','natasha','boris','agent-rtx','squirrelbot'];

const SLASH_CMDS = [
  { cmd: '/task list', desc: 'List pending tasks from work queue' },
  { cmd: '/task create', desc: '/task create <title> — add task to queue' },
  { cmd: '/project list', desc: 'List all projects' },
  { cmd: '/project create', desc: '/project create <name> [desc]' },
];

let TOKEN = localStorage.getItem('sc_token') || '';
let currentChannel = 'chat';
let showBroadcast = false;
let messages = [];
let agents = [];
let sseConn = null;
let lastMsgId = 0;
let autocompleteIndex = 0;
let autocompleteItems = [];

function getColor(name) {
  return AGENT_COLORS[name] || '#' + (parseInt(name.charCodeAt(0) * 13 % 0xffffff).toString(16).padStart(6,'0'));
}
function getInitials(name) {
  return name.slice(0, 2).toUpperCase();
}
function avatarStyle(name) {
  const c = getColor(name);
  return `background:${c}22; color:${c};`;
}

// Login
window.onload = () => {
  if (TOKEN) tryInit();
};

async function doLogin() {
  TOKEN = document.getElementById('token-input').value.trim();
  const r = await fetch('/health', { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (r.ok) {
    localStorage.setItem('sc_token', TOKEN);
    tryInit();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function tryInit() {
  // Quick health check
  const r = await fetch('/health');
  if (!r.ok) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  init();
}

async function init() {
  await loadMessages();
  loadAgents();
  loadTasks();
  loadProjects();
  connectSSE();
  setInterval(loadAgents, 30000);
  setInterval(loadTasks, 60000);
  setInterval(loadProjects, 60000);
}

// Channel
function setChannel(ch) {
  currentChannel = ch;
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  document.getElementById('ch-' + ch)?.classList.add('active');
  document.getElementById('channel-title').textContent = ch === 'broadcast' ? '📢 broadcast' : '# ' + ch;
  document.getElementById('channel-desc').textContent = ch === 'broadcast' ? 'System-wide announcements' : 'Team coordination';
  document.getElementById('msg-input').placeholder = `Message #${ch} — / for commands, @ to mention`;
  messages = [];
  loadMessages();
}

function toggleBroadcast(el) {
  showBroadcast = el.checked;
  renderMessages();
}

// Messages
async function loadMessages() {
  const channel = showBroadcast ? 'all' : currentChannel;
  const res = await apiFetch(`/api/messages?channel=${channel}&limit=100`);
  if (res) {
    messages = res;
    if (messages.length) lastMsgId = Math.max(...messages.map(m => m.id));
    renderMessages();
  }
}

function renderMessages() {
  const el = document.getElementById('messages');
  if (!messages.length) {
    el.innerHTML = '<div class="loading-msg">No messages yet. Say hello!</div>';
    return;
  }

  const filtered = showBroadcast ? messages : messages.filter(m => m.channel === currentChannel);
  if (!filtered.length) {
    el.innerHTML = '<div class="loading-msg">No messages in this channel yet.</div>';
    return;
  }

  let html = '';
  let lastDay = '';
  for (const m of filtered) {
    const d = new Date(m.ts);
    const day = d.toDateString();
    if (day !== lastDay) {
      lastDay = day;
      html += `<div class="day-divider">${day === new Date().toDateString() ? 'Today' : day}</div>`;
    }
    html += renderMsg(m);
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function renderMsg(m) {
  const time = new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const color = getColor(m.from_agent);
  const initials = getInitials(m.from_agent);
  const text = escapeHtml(m.text).replace(/@(\w[\w-]*)/g, '<span class="mention">@$1</span>');
  const channelBadge = showBroadcast && m.channel !== currentChannel
    ? `<span class="msg-channel-badge">#${m.channel}</span>` : '';
  const botReplyHtml = m.slash_result ? `<div class="bot-reply">${escapeHtml(m.text)}</div>` : '';

  return `<div class="msg" data-id="${m.id}">
    <div class="msg-avatar" style="background:${color}22;color:${color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-from" style="color:${color}">${escapeHtml(m.from_agent)}</span>
        <span class="msg-time">${time}</span>
        ${channelBadge}
      </div>
      <div class="msg-text">${text}</div>
      ${botReplyHtml}
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addMessage(m) {
  if (m.channel !== currentChannel && !showBroadcast) return;
  const el = document.getElementById('messages');
  // Remove loading state
  if (el.querySelector('.loading-msg')) el.innerHTML = '';
  messages.push(m);
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
  el.insertAdjacentHTML('beforeend', renderMsg(m));
  if (atBottom) el.scrollTop = el.scrollHeight;
}

// SSE
function connectSSE() {
  if (sseConn) sseConn.close();
  sseConn = new EventSource('/api/stream');
  sseConn.onopen = () => {
    document.getElementById('conn-status').innerHTML = '<div class="conn-dot"></div> Live';
  };
  sseConn.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'message') {
        if (!messages.find(m => m.id === data.message.id)) {
          addMessage(data.message);
        }
      }
    } catch {}
  };
  sseConn.onerror = () => {
    document.getElementById('conn-status').innerHTML = '<div class="conn-dot" style="background:var(--rocky)"></div> Reconnecting...';
    setTimeout(connectSSE, 3000);
  };
}

// Agents
async function loadAgents() {
  const data = await apiFetch('/api/agents');
  if (data) {
    agents = data;
    renderAgents();
  }
}

function renderAgents() {
  const el = document.getElementById('agent-list');
  if (!agents.length) {
    el.innerHTML = '<div style="padding:8px 16px;font-size:12px;color:var(--text2)">No agents registered</div>';
    return;
  }
  el.innerHTML = agents.map(a => {
    const color = getColor(a.name || a.agent_id || 'unknown');
    const name = a.name || a.agent_id || 'unknown';
    const online = a.online;
    const lastSeen = a.ts ? timeAgo(a.ts) : 'never';
    return `<div class="agent-item">
      <div class="agent-avatar" style="background:${color}22;color:${color}">${getInitials(name)}</div>
      <div class="agent-info">
        <div class="agent-name">${escapeHtml(name)}</div>
        <div class="agent-status">${online ? 'online' : 'last: ' + lastSeen}</div>
      </div>
      <div class="status-dot ${online ? 'online' : 'offline'}"></div>
    </div>`;
  }).join('');
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

// Tasks
async function loadTasks() {
  const el = document.getElementById('tasks-list');
  try {
    const res = await fetch('http://localhost:8789/api/queue?status=pending&limit=10');
    if (res.ok) {
      const tasks = await res.json();
      if (!tasks.length) {
        el.innerHTML = '<div class="empty-state">No pending tasks</div>';
        return;
      }
      el.innerHTML = tasks.map(t => `
        <div class="task-item">
          <div class="task-title">${escapeHtml(t.title || t.text || t.id)}</div>
          <div class="task-meta">${t.assignee ? '@' + t.assignee : 'unassigned'} · ${t.status || 'pending'}</div>
        </div>`).join('');
      return;
    }
  } catch {}
  el.innerHTML = '<div class="empty-state">RCC offline</div>';
}

// Projects
async function loadProjects() {
  const data = await apiFetch('/api/projects');
  const el = document.getElementById('projects-list');
  if (!data || !data.length) {
    el.innerHTML = '<div class="empty-state">No projects yet</div>';
    return;
  }
  el.innerHTML = data.map(p => `
    <div class="project-item">
      <div class="project-name">${escapeHtml(p.name)}</div>
      <div class="project-meta">
        <span class="status-badge status-${p.status === 'active' ? 'active' : 'done'}">${p.status}</span>
        ${p.assignee ? '<span>@' + escapeHtml(p.assignee) + '</span>' : ''}
      </div>
    </div>`).join('');
}

// Panel toggle
function togglePanel(id) {
  const panel = document.getElementById(id + '-panel');
  const toggle = document.getElementById(id + '-toggle');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    toggle.textContent = '▼';
  } else {
    panel.style.display = 'none';
    toggle.textContent = '▶';
  }
}

// Input handling
function handleKey(e) {
  const ac = document.getElementById('autocomplete');
  const sh = document.getElementById('slash-hints');

  // Handle autocomplete navigation
  if (ac.classList.contains('visible') || sh.classList.contains('visible')) {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveAutocomplete(1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); moveAutocomplete(-1); return; }
    if (e.key === 'Tab' || e.key === 'Enter') {
      if (ac.classList.contains('visible')) {
        e.preventDefault();
        selectAutocomplete();
        return;
      }
      if (sh.classList.contains('visible') && e.key === 'Tab') {
        e.preventDefault();
        selectSlashHint();
        return;
      }
    }
    if (e.key === 'Escape') {
      hideAutoComplete();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleInput(el) {
  // Auto-resize
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';

  const val = el.value;
  const cursor = el.selectionStart;
  const textUpToCursor = val.slice(0, cursor);

  // @ mention autocomplete
  const mentionMatch = textUpToCursor.match(/@(\w*)$/);
  if (mentionMatch) {
    const query = mentionMatch[1].toLowerCase();
    const matches = [...AGENTS_LIST, ...agents.map(a => a.name || a.agent_id)].filter(
      (v, i, a) => a.indexOf(v) === i && v.toLowerCase().startsWith(query)
    );
    showMentionAutocomplete(matches, mentionMatch[1]);
    hideSlashHints();
    return;
  }

  // Slash command hints
  if (val.startsWith('/')) {
    const matches = SLASH_CMDS.filter(c => c.cmd.startsWith(val.split(' ')[0]));
    if (matches.length) {
      showSlashHints(matches);
      hideAutocomplete();
      return;
    }
  }

  hideAutoComplete();
  hideSlashHints();
}

function showMentionAutocomplete(items, query) {
  const ac = document.getElementById('autocomplete');
  if (!items.length) { hideAutocomplete(); return; }
  autocompleteItems = items;
  autocompleteIndex = 0;
  ac.innerHTML = items.map((name, i) => {
    const color = getColor(name);
    return `<div class="autocomplete-item ${i === 0 ? 'selected' : ''}" onclick="insertMention('${name}')">
      <div class="autocomplete-avatar" style="background:${color}22;color:${color}">${getInitials(name)}</div>
      @${escapeHtml(name)}
    </div>`;
  }).join('') + '<div class="autocomplete-hint">↑↓ navigate · Tab/Enter to select · Esc to dismiss</div>';
  ac.classList.add('visible');
}

function showSlashHints(cmds) {
  const sh = document.getElementById('slash-hints');
  sh.innerHTML = cmds.map((c, i) => `
    <div class="slash-hint-item ${i === 0 ? 'selected' : ''}" onclick="insertSlash('${c.cmd}')">
      <span class="slash-cmd">${escapeHtml(c.cmd)}</span>
      <span class="slash-desc">${escapeHtml(c.desc)}</span>
    </div>`).join('');
  autocompleteItems = cmds.map(c => c.cmd);
  autocompleteIndex = 0;
  sh.classList.add('visible');
}

function hideAutocomplete() { document.getElementById('autocomplete').classList.remove('visible'); }
function hideSlashHints() { document.getElementById('slash-hints').classList.remove('visible'); }
function hideAutoComplete() { hideAutocomplete(); hideSlashHints(); }

function moveAutocomplete(dir) {
  const ac = document.getElementById('autocomplete');
  const sh = document.getElementById('slash-hints');
  const el = ac.classList.contains('visible') ? ac : sh;
  const items = el.querySelectorAll('.autocomplete-item, .slash-hint-item');
  if (!items.length) return;
  items[autocompleteIndex].classList.remove('selected');
  autocompleteIndex = (autocompleteIndex + dir + items.length) % items.length;
  items[autocompleteIndex].classList.add('selected');
}

function selectAutocomplete() {
  insertMention(autocompleteItems[autocompleteIndex]);
}

function selectSlashHint() {
  insertSlash(autocompleteItems[autocompleteIndex]);
}

function insertMention(name) {
  const inp = document.getElementById('msg-input');
  const val = inp.value;
  const cursor = inp.selectionStart;
  const before = val.slice(0, cursor).replace(/@\w*$/, '@' + name + ' ');
  const after = val.slice(cursor);
  inp.value = before + after;
  inp.selectionStart = inp.selectionEnd = before.length;
  hideAutocomplete();
  inp.focus();
}

function insertSlash(cmd) {
  const inp = document.getElementById('msg-input');
  inp.value = cmd + ' ';
  inp.selectionStart = inp.selectionEnd = inp.value.length;
  hideSlashHints();
  inp.focus();
}

// Send message
async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  hideAutoComplete();

  const from = document.getElementById('sender-select').value;
  const mentions = [...text.matchAll(/@(\w[\w-]*)/g)].map(m => m[1]);

  inp.value = '';
  inp.style.height = 'auto';

  const res = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
    body: JSON.stringify({ from, text, channel: currentChannel, mentions }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    alert(err.error || 'Failed to send message');
  }
}

// API helper
async function apiFetch(path) {
  try {
    const res = await fetch(path, { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (res.ok) return res.json();
  } catch {}
  return null;
}

// Enter key on token input
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
