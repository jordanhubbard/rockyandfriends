<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SquirrelChat</title>
<link rel="manifest" href="/manifest.json" />
<style>
:root {
  color-scheme: dark;
  --bg: #1a1d21;
  --sidebar: #101214;
  --panel: #111418;
  --input: #2a2d31;
  --text: #d1d2d3;
  --muted: #8f939b;
  --accent: #4a9eff;
  --online: #23a55a;
  --away: #f0b232;
  --offline: #80848e;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
#app {
  display: grid;
  grid-template-columns: 240px 1fr 320px;
  height: 100vh;
}
.sidebar {
  background: var(--sidebar);
  border-right: 1px solid #1f2329;
  display: flex;
  flex-direction: column;
}
.sidebar header {
  padding: 16px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.channel-list { flex: 1; overflow-y: auto; padding: 8px; }
.channel {
  padding: 8px 12px;
  border-radius: 6px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.channel.dm::before { content: '•'; opacity: 0.6; }
.channel.active { background: #22262c; color: var(--text); }
.channel .unread { margin-left: auto; font-size: 12px; color: var(--accent); }
.main { display: flex; flex-direction: column; border-right: 1px solid #1f2329; position: relative; }
.main header { padding: 12px 16px; border-bottom: 1px solid #1f2329; display: flex; align-items: center; gap: 12px; }
.search { flex: 1; background: var(--input); border: none; padding: 10px 12px; border-radius: 6px; color: var(--text); }
.messages { flex: 1; overflow-y: auto; padding: 16px; }
.message { margin-bottom: 14px; display: grid; grid-template-columns: 44px 1fr; gap: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; }
.message-header { display: flex; gap: 8px; align-items: baseline; }
.message-body { white-space: pre-wrap; line-height: 1.45; }
.actions { opacity: 0; display: flex; gap: 8px; font-size: 13px; color: var(--muted); }
.message:hover .actions { opacity: 1; }
.thread-link { color: var(--accent); font-size: 12px; cursor: pointer; margin-top: 4px; display: inline-flex; gap: 6px; align-items: center; }
.reactions { font-size: 12px; margin-top: 4px; display: flex; gap: 6px; }
.composer { border-top: 1px solid #1f2329; padding: 12px 16px; background: #16191d; }
textarea { width: 100%; min-height: 80px; background: var(--input); border: 1px solid #33383f; border-radius: 8px; padding: 12px; color: var(--text); resize: vertical; font-family: inherit; }
button.primary { margin-top: 10px; background: var(--accent); border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; }
.right-panel { background: var(--panel); display: flex; flex-direction: column; }
.section { padding: 16px; border-bottom: 1px solid #1f2329; }
.section h3 { margin: 0 0 10px; font-size: 14px; color: var(--muted); text-transform: uppercase; }
.list { display: flex; flex-direction: column; gap: 8px; }
.presence { display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.pin-drawer { position: absolute; top: 64px; right: 24px; width: 320px; max-height: 60vh; overflow-y: auto; background: #1f2329; border: 1px solid #2a2f36; border-radius: 8px; padding: 16px; display: none; z-index: 30; }
.pin-drawer.active { display: block; }
.emoji-picker { position: absolute; background: #1f2329; border: 1px solid #2a2f36; border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4,32px); gap: 4px; z-index: 40; }
.emoji-picker button { background: none; border: none; font-size: 20px; cursor: pointer; }
.thread-panel { position: absolute; top: 0; right: 0; width: 320px; height: 100%; background: var(--panel); border-left: 1px solid #1f2329; display: none; flex-direction: column; z-index: 25; }
.thread-panel.active { display: flex; }
.thread-panel header { padding: 12px 16px; border-bottom: 1px solid #1f2329; display: flex; justify-content: space-between; }
.thread-messages { flex: 1; overflow-y: auto; padding: 12px; }
.thread-composer { padding: 12px; border-top: 1px solid #1f2329; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #22262c; padding: 24px; border-radius: 10px; width: 320px; display: flex; flex-direction: column; gap: 12px; }
.modal input { padding: 10px; border-radius: 6px; border: 1px solid #3a4048; background: var(--input); color: var(--text); }
.hint-box { position: absolute; background: #1f2329; border: 1px solid #2a2f36; border-radius: 8px; padding: 8px; display: none; flex-direction: column; gap: 6px; z-index: 35; }
.hint-box button { background: none; border: none; color: var(--text); text-align: left; padding: 6px; border-radius: 6px; cursor: pointer; }
.hint-box button:hover { background: #2a2f36; }
@media (max-width: 1024px) {
  #app { grid-template-columns: 200px 1fr; }
  .right-panel { display: none; }
}
@media (max-width: 720px) {
  #app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
.mic-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; color: var(--muted); line-height: 1; }
.mic-btn:hover { background: var(--input); }
.mic-btn.recording { color: #e74c3c; animation: sc-pulse 1s ease-in-out infinite; }
@keyframes sc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.tts-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--muted); padding: 0 2px; }
.tts-btn:hover { color: var(--text); }
.tts-btn.tts-loading { opacity: 0.45; cursor: wait; }
.tts-btn.tts-playing { color: var(--accent); }
/* Agent Status Panel */
.agent-status-panel { padding: 12px 8px; border-top: 1px solid #1f2329; }
.agent-status-panel h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 4px 8px; }
.agent-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; cursor: default; position: relative; }
.agent-row:hover { background: #1a1f25; }
.agent-row:hover .agent-task-tooltip { display: block; }
.agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.agent-dot.working { background: #3b82f6; }
.agent-dot.idle { background: #6b7280; }
.agent-dot.offline { background: #374151; }
.agent-dot.unknown { background: #4b5563; }
.agent-name { font-size: 12px; color: var(--text); min-width: 64px; }
.agent-task-label { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
.agent-task-tooltip { display: none; position: absolute; left: 0; top: 100%; z-index: 50; background: #1f2329; border: 1px solid #2a2f36; border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--text); white-space: normal; min-width: 200px; max-width: 280px; line-height: 1.4; }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <header>
      <span>SquirrelChat</span>
      <button id="toggle-sidebar" title="Toggle">☰</button>
    </header>
    <div class="channel-list" id="channel-list"></div>
    <div class="agent-status-panel" id="agent-status-panel">
      <h4>Fleet Status</h4>
      <div id="agent-status-list"></div>
    </div>
  </nav>
  <section class="main">
    <header>
      <div>
        <div id="channel-title">#general</div>
        <small id="channel-desc" style="color: var(--muted);"></small>
      </div>
      <button id="pins-btn" style="margin-left:auto;background:none;border:none;color:var(--accent);cursor:pointer;">Pins</button>
      <input class="search" id="search" placeholder="Search SquirrelChat" />
      <span id="me-badge" style="font-size:13px;color:var(--muted);white-space:nowrap;cursor:pointer;" title="Click to sign out" onclick="signOut()">…</span>
    </header>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <textarea id="composer" placeholder="Message #general"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <small style="color:var(--muted);">Enter to send • Shift+Enter for newline • Arrow ↑ to edit last</small>
          <button class="mic-btn" id="mic-btn" title="Voice input (click to record)">🎤</button>
        </div>
        <button class="primary" id="send">Send</button>
      </div>
    </div>
  </section>
  <aside class="right-panel">
    <div class="section">
      <h3>Agents</h3>
      <div class="list" id="agents"></div>
    </div>
    <div class="section">
      <h3>Projects</h3>
      <div class="list" id="projects"></div>
    </div>
  </aside>
</div>
<div class="pin-drawer" id="pin-drawer"></div>
<div class="thread-panel" id="thread-panel">
  <header>
    <span id="thread-title">Thread</span>
    <button id="close-thread" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
  </header>
  <div class="thread-messages" id="thread-messages"></div>
  <div class="thread-composer">
    <textarea id="thread-input" placeholder="Reply..."></textarea>
    <button class="primary" id="thread-send">Reply</button>
  </div>
</div>
<div class="modal-backdrop" id="login-modal" style="display:none;">
  <div class="modal">
    <h2>👋 Who are you?</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 12px;">Enter your name to join the chat. You'll get a persistent token stored in your browser.</p>
    <input id="login-name" placeholder="Your name (e.g. jkh)" autocomplete="off" />
    <input id="login-token" placeholder="Token (optional — leave blank for name-claim)" autocomplete="off" />
    <button class="primary" id="login-btn">Enter SquirrelChat →</button>
  </div>
</div>
<div class="hint-box" id="mention-box"></div>
<div class="hint-box" id="slash-box"></div>
<script>
const state = {
  token: localStorage.getItem('sc_token') || '',
  user: JSON.parse(localStorage.getItem('sc_user') || 'null'),
  channels: [],
  currentChannel: null,
  messages: [],
  agents: [],
  projects: [],
  pins: [],
  thread: null,
};
const API_BASE = '/api';
const headers = () => ({ 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) });
async function api(path, opts = {}) {
  const res = await fetch(`${API_BASE}${path}`, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
function relativeTime(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'yesterday';
  return days + 'd ago';
}
function avatarColor(name = '') {
  const palette = ['#4a9eff', '#23a55a', '#f0b232', '#e74c3c', '#9b59b6', '#1abc9c', '#e67e22', '#3498db'];
  let hash = 0;
  for (const c of name) hash = (hash + c.charCodeAt(0)) % palette.length;
  return palette[hash];
}
function renderChannels() {
  const list = document.getElementById('channel-list');
  list.innerHTML = '';
  state.channels.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'channel' + (ch.id.startsWith('dm-') ? ' dm' : '') + (state.currentChannel?.id === ch.id ? ' active' : '');
    div.innerHTML = `${ch.id.startsWith('dm-') ? '' : '#'}${ch.id}`;
    div.onclick = () => selectChannel(ch.id);
    list.appendChild(div);
  });
}
function renderMessages(container = document.getElementById('messages'), messages = state.messages) {
  container.innerHTML = '';
  messages.forEach(msg => {
    const row = document.createElement('div');
    row.className = 'message';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    const displayName = msg.from_name || msg.from_agent || 'unknown';
    avatar.style.background = avatarColor(displayName);
    avatar.textContent = displayName.slice(0,2).toUpperCase();
    const content = document.createElement('div');
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('strong');
    name.textContent = displayName;
    const time = document.createElement('span');
    time.style.color = 'var(--muted)';
    time.style.fontSize = '12px';
    time.textContent = relativeTime(msg.ts);
    header.append(name, time);
    const body = document.createElement('div');
    body.className = 'message-body';
    body.innerHTML = renderMarkdown(msg.text || '');
    const actions = document.createElement('div');
    actions.className = 'actions';
    const react = document.createElement('span');
    react.textContent = '😀';
    react.onclick = (e) => openEmojiPicker(e, msg);
    actions.appendChild(react);
    const myId = state.user?.id || state.user?.name;
    if (msg.from_agent === myId) {
      const edit = document.createElement('span'); edit.textContent = '✎'; edit.onclick = () => editMessage(msg);
      const del = document.createElement('span'); del.textContent = '🗑'; del.onclick = () => deleteMessage(msg);
      actions.append(edit, del);
    }
    const pin = document.createElement('span'); pin.textContent = '📌'; pin.onclick = () => pinMessage(msg); actions.append(pin);
    if (msg.from_agent !== myId) {
      const ttsBtn = document.createElement('button');
      ttsBtn.className = 'tts-btn';
      ttsBtn.textContent = '🔊';
      ttsBtn.title = 'Read aloud';
      ttsBtn.onclick = () => playTTS(msg.text || '', ttsBtn);
      actions.appendChild(ttsBtn);
    }
    content.append(header, body, actions);
    if (msg.thread_count && msg.thread_count > 0) {
      const threadLink = document.createElement('div');
      threadLink.className = 'thread-link';
      threadLink.textContent = `${msg.thread_count} repl${msg.thread_count === 1 ? 'y' : 'ies'} ›`;
      threadLink.onclick = () => loadThread(msg);
      content.appendChild(threadLink);
    } else {
      const replyLink = document.createElement('div');
      replyLink.className = 'thread-link';
      replyLink.style.opacity = 0.7;
      replyLink.textContent = 'Reply in thread';
      replyLink.onclick = () => loadThread(msg);
      content.appendChild(replyLink);
    }
    row.append(avatar, content);
    container.appendChild(row);
  });
  container.scrollTop = container.scrollHeight;
}
function renderMarkdown(text) {
  return text
    .replace(/```([\s\S]+?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[\w./?=#\-%]+)/g, '<a href="$1" target="_blank">$1</a>');
}
function renderAgents() {
  const list = document.getElementById('agents');
  list.innerHTML = '';
  state.agents.forEach(agent => {
    const row = document.createElement('div');
    row.className = 'presence';
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.background = agent.online ? 'var(--online)' : (agent.away ? 'var(--away)' : 'var(--offline)');
    row.append(dot, document.createTextNode(agent.name || agent.id));
    list.appendChild(row);
  });
}
function renderProjects() {
  const list = document.getElementById('projects');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${p.name}</strong><div style="color:var(--muted);font-size:12px;">${p.description || ''}</div>`;
    list.appendChild(div);
  });
}
function renderPins() {
  const drawer = document.getElementById('pin-drawer');
  drawer.innerHTML = '<h3 style="margin-top:0">Pinned</h3>';
  state.pins.forEach(p => {
    const div = document.createElement('div');
    div.style.marginBottom = '12px';
    div.innerHTML = `<strong>${p.from_agent}</strong> <small style="color:var(--muted);">${relativeTime(p.ts)}</small><div>${renderMarkdown(p.text)}</div>`;
    drawer.appendChild(div);
  });
}
async function loadInitialData() {
  state.channels = await api('/channels');
  renderChannels();
  // Honour deep-link: /channel/<id> → open that channel on load
  const pathMatch = location.pathname.match(/^\/channel\/(.+)$/);
  const initChannel = pathMatch ? decodeURIComponent(pathMatch[1]) : (state.channels[0]?.id || 'general');
  selectChannel(initChannel);
  state.agents = await api('/agents');
  renderAgents();
  state.projects = await api('/projects');
  renderProjects();
  // Update identity badge
  const badge = document.getElementById('me-badge');
  if (badge && state.user) {
    badge.textContent = '👤 ' + (state.user.name || state.user.id) + ' ×';
    badge.title = 'Signed in as ' + (state.user.name || state.user.id) + ' — click to sign out';
  }
}
function signOut() {
  if (!confirm('Sign out of SquirrelChat?')) return;
  localStorage.removeItem('sc_user');
  localStorage.removeItem('sc_token');
  state.user = null;
  state.token = '';
  document.getElementById('me-badge').textContent = '…';
  document.getElementById('login-modal').style.display = 'flex';
}
async function selectChannel(id) {
  state.currentChannel = state.channels.find(c => c.id === id) || { id, name: id };
  // Update URL so the active channel is deep-linkable
  const newPath = '/channel/' + encodeURIComponent(id);
  if (location.pathname !== newPath) history.pushState({ channel: id }, '', newPath);
  document.getElementById('channel-title').textContent = state.currentChannel.id.startsWith('dm-') ? state.currentChannel.name : '#' + state.currentChannel.id;
  document.getElementById('composer').placeholder = `Message ${state.currentChannel.id.startsWith('dm-') ? state.currentChannel.name : '#' + state.currentChannel.id}`;
  const res = await api(`/messages?channel=${encodeURIComponent(id)}&limit=50`);
  state.messages = res.reverse();
  renderMessages();
  state.pins = await api(`/channels/${encodeURIComponent(id)}/pins`);
  renderPins();
}
async function sendMessage(threadId = null) {
  const box = threadId ? document.getElementById('thread-input') : document.getElementById('composer');
  const text = box.value.trim();
  if (!text) return;
  if (!state.user || !state.token) {
    document.getElementById('login-modal').style.display = 'flex';
    return;
  }
  await api('/messages', {
    method: 'POST',
    body: JSON.stringify({ from: state.user.id || state.user.name, text, channel: state.currentChannel.id, mentions: [], thread_id: threadId }),
  });
  box.value = '';
}
async function editMessage(msg) {
  const text = prompt('Edit message', msg.text);
  if (text === null) return;
  await api(`/messages/${msg.id}`, { method: 'PATCH', body: JSON.stringify({ text }) });
}
async function deleteMessage(msg) {
  if (!confirm('Delete message?')) return;
  await api(`/messages/${msg.id}`, { method: 'DELETE' });
}
async function pinMessage(msg) {
  await api(`/channels/${state.currentChannel.id}/pins/${msg.id}`, { method: 'POST', body: JSON.stringify({ from: state.user?.id || state.user?.name }) });
  state.pins = await api(`/channels/${state.currentChannel.id}/pins`);
  renderPins();
}
function openEmojiPicker(event, msg) {
  event.stopPropagation();
  closeEmojiPicker();
  const picker = document.createElement('div');
  picker.className = 'emoji-picker';
  picker.id = 'emoji-picker';
  picker.style.top = event.clientY + 'px';
  picker.style.left = event.clientX + 'px';
  ['👍','❤️','😂','🎉','🔥','👀','✅','🚀'].forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e;
    btn.onclick = async () => {
      const uid = state.user?.id || state.user?.name;
      await api(`/messages/${msg.id}/react`, { method: 'POST', body: JSON.stringify({ emoji: e, user_id: uid, from: uid }) });
      closeEmojiPicker();
    };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
}
function closeEmojiPicker() { document.getElementById('emoji-picker')?.remove(); }
async function loadThread(msg) {
  state.thread = msg;
  document.getElementById('thread-panel').classList.add('active');
  document.getElementById('thread-title').textContent = msg.text.slice(0, 40) || 'Thread';
  const replies = await api(`/messages?thread_id=${msg.id}`);
  renderMessages(document.getElementById('thread-messages'), replies);
}
function renderMentionBox(items, insertFn, x, y) {
  const box = document.getElementById('mention-box');
  if (!items.length) { box.style.display = 'none'; return; }
  box.innerHTML = '';
  items.forEach(agent => {
    const btn = document.createElement('button');
    btn.textContent = agent.name || agent.id;
    btn.onclick = () => insertFn(agent);
    box.appendChild(btn);
  });
  box.style.display = 'flex';
  box.style.top = y + 'px';
  box.style.left = x + 'px';
}
function hideMentionBox() { document.getElementById('mention-box').style.display = 'none'; }
function showSlashHints(x, y) {
  const hints = [ '/task list', '/task create', '/project list', '/project show' ];
  const box = document.getElementById('slash-box');
  box.innerHTML = '';
  hints.forEach(cmd => {
    const btn = document.createElement('button');
    btn.textContent = cmd;
    btn.onclick = () => insertText(cmd + ' ');
    box.appendChild(btn);
  });
  box.style.display = 'flex';
  box.style.top = y + 'px';
  box.style.left = x + 'px';
}
function hideSlashBox() { document.getElementById('slash-box').style.display = 'none'; }
function insertText(text) {
  const box = document.getElementById('composer');
  const start = box.selectionStart;
  const end = box.selectionEnd;
  const value = box.value;
  box.value = value.slice(0,start) + text + value.slice(end);
  box.focus();
  box.selectionStart = box.selectionEnd = start + text.length;
}
function setupSSE() {
  const evt = new EventSource('/api/stream');
  evt.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (data.channel === state.currentChannel.id) {
        state.messages.push(data);
        renderMessages();
      }
    } catch {}
  };
  evt.onerror = () => { evt.close(); setTimeout(setupSSE, 2000); };
}
function setupLogin() {
  const modal = document.getElementById('login-modal');
  if (!state.user || !state.token) modal.style.display = 'flex';
  document.getElementById('login-btn').onclick = async () => {
    const nameVal = document.getElementById('login-name').value.trim();
    const tokenVal = document.getElementById('login-token').value.trim();
    if (!nameVal) return alert('Name required');
    try {
      let token, user;
      if (tokenVal) {
        // Token provided — verify it against /api/me
        const r = await fetch('/api/me', { headers: { Authorization: `Bearer ${tokenVal}` } });
        const data = await r.json();
        if (data.id === 'anonymous' || data.needs_name) throw new Error('Invalid token');
        token = tokenVal;
        user = data;
      } else {
        // Name-claim login
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: nameVal }),
        });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        token = data.token;
        user = data.user;
      }
      state.user = user;
      state.token = token;
      localStorage.setItem('sc_user', JSON.stringify(user));
      localStorage.setItem('sc_token', token);
      modal.style.display = 'none';
      init();
    } catch (err) {
      alert('Login failed: ' + err.message);
    }
  };
}
function setupEvents() {
  document.getElementById('send').onclick = () => sendMessage();
  document.getElementById('composer').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    if (e.key === 'Escape') { closeEmojiPicker(); hideMentionBox(); hideSlashBox(); }
    if (e.key === 'ArrowUp' && !e.shiftKey && !state.thread) {
      const last = [...state.messages].reverse().find(m => m.from_agent === (state.user?.id || state.user?.name));
      if (last) editMessage(last);
    }
  });
  document.getElementById('composer').addEventListener('keyup', (e) => {
    const box = e.target;
    const cursor = box.selectionStart;
    const text = box.value.slice(0, cursor);
    const rect = box.getBoundingClientRect();
    const mentionMatch = text.match(/@([a-z0-9_-]*)$/i);
    if (mentionMatch) {
      const filter = mentionMatch[1].toLowerCase();
      const matches = state.agents.filter(a => (a.name || a.id).toLowerCase().includes(filter));
      renderMentionBox(matches, (agent) => {
        const insert = `@${agent.name || agent.id} `;
        box.value = box.value.slice(0, cursor - mentionMatch[0].length) + insert + box.value.slice(cursor);
        box.selectionStart = box.selectionEnd = (cursor - mentionMatch[0].length) + insert.length;
        hideMentionBox();
      }, rect.left + 20, rect.top - 10);
    } else {
      hideMentionBox();
    }
    const slashMatch = text.match(/\/(\w*)$/);
    if (slashMatch && slashMatch.index === 0) {
      showSlashHints(rect.left + 200, rect.top - 10);
    } else hideSlashBox();
  });
  document.getElementById('search').addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      if (!q) return;
      const results = await api(`/search?q=${encodeURIComponent(q)}`);
      renderMessages(document.getElementById('messages'), results);
    }
  });
  document.getElementById('pins-btn').onclick = () => document.getElementById('pin-drawer').classList.toggle('active');
  document.getElementById('thread-send').onclick = () => state.thread && sendMessage(state.thread.id);
  document.getElementById('close-thread').onclick = () => document.getElementById('thread-panel').classList.remove('active');
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.pin-drawer') && !e.target.closest('#pins-btn')) document.getElementById('pin-drawer').classList.remove('active');
  });
}
async function init() {
  try {
    await loadInitialData();
    setupSSE();
  } catch (err) {
    console.error(err);
  }
}
// ── Voice: STT mic recording ──────────────────────────────────────────────────
let _mediaRecorder = null;
let _audioChunks = [];
let _isRecording = false;

function setupMicButton() {
  const micBtn = document.getElementById('mic-btn');
  const composer = document.getElementById('composer');

  micBtn.onclick = async () => {
    if (_isRecording) {
      _mediaRecorder && _mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
      _mediaRecorder = new MediaRecorder(stream, { mimeType });
      _audioChunks = [];

      _mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) _audioChunks.push(e.data); };

      _mediaRecorder.onstop = async () => {
        _isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.title = 'Voice input (click to record)';
        stream.getTracks().forEach(t => t.stop());

        const blob = new Blob(_audioChunks, { type: mimeType });
        micBtn.textContent = '⏳';
        micBtn.disabled = true;

        try {
          const fd = new FormData();
          fd.append('audio', blob, 'recording.webm');
          const authHdr = state.token ? { Authorization: `Bearer ${state.token}` } : {};
          const res = await fetch('/api/voice/transcribe', { method: 'POST', headers: authHdr, body: fd });
          if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.reason || d.error || 'transcription failed'); }
          const { text } = await res.json();
          if (text) {
            composer.value += (composer.value ? ' ' : '') + text;
            composer.focus();
          }
        } catch (err) {
          console.warn('[voice/stt]', err);
          alert('Voice transcription unavailable: ' + err.message);
        } finally {
          micBtn.textContent = '🎤';
          micBtn.disabled = false;
        }
      };

      _mediaRecorder.start();
      _isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Recording… click to stop';
    } catch (err) {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        alert('Microphone access denied. Allow mic permission in your browser settings.');
      } else {
        console.error('[voice/mic]', err);
        alert('Could not access microphone: ' + err.message);
      }
    }
  };
}

// ── Voice: TTS playback ───────────────────────────────────────────────────────
let _currentAudio = null;
let _currentTtsBtn = null;

async function playTTS(text, btn) {
  // Toggle off if same button
  if (_currentTtsBtn === btn && _currentAudio && !_currentAudio.ended) {
    _currentAudio.pause();
    _currentAudio = null;
    btn.classList.remove('tts-playing', 'tts-loading');
    _currentTtsBtn = null;
    return;
  }
  // Stop any other playing audio
  if (_currentAudio) {
    _currentAudio.pause();
    _currentTtsBtn && _currentTtsBtn.classList.remove('tts-playing', 'tts-loading');
    _currentAudio = null;
  }
  _currentTtsBtn = btn;
  btn.classList.add('tts-loading');

  try {
    const authHdr = state.token ? { Authorization: `Bearer ${state.token}` } : {};
    const res = await fetch('/api/voice/synthesize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHdr },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      alert('TTS unavailable: ' + (d.reason || d.error || res.status));
      btn.classList.remove('tts-loading');
      _currentTtsBtn = null;
      return;
    }
    const audioBlob = await res.blob();
    const url = URL.createObjectURL(audioBlob);
    _currentAudio = new Audio(url);
    btn.classList.remove('tts-loading');
    btn.classList.add('tts-playing');
    _currentAudio.onended = () => {
      btn.classList.remove('tts-playing');
      URL.revokeObjectURL(url);
      _currentAudio = null;
      _currentTtsBtn = null;
    };
    _currentAudio.play();
  } catch (err) {
    console.warn('[voice/tts]', err);
    btn.classList.remove('tts-loading', 'tts-playing');
    alert('TTS error: ' + err.message);
    _currentTtsBtn = null;
  }
}

// ── Fleet Agent Status Panel ──────────────────────────────────────────────────
function renderAgentStatus(agents) {
  const list = document.getElementById('agent-status-list');
  if (!list) return;
  list.innerHTML = '';
  agents.forEach(a => {
    const row = document.createElement('div');
    row.className = 'agent-row';
    const dot = document.createElement('div');
    dot.className = `agent-dot ${a.status || 'offline'}`;
    const name = document.createElement('span');
    name.className = 'agent-name';
    name.textContent = a.name;
    const taskLabel = document.createElement('span');
    taskLabel.className = 'agent-task-label';
    let taskText = '';
    let fullDesc = '';
    if (a.status === 'working' && a.currentTask) {
      taskText = (a.currentTask.title || '').slice(0, 38) + (a.currentTask.title?.length > 38 ? '…' : '');
      fullDesc = a.currentTask.title || '';
    } else if (a.freeStatus?.text) {
      taskText = a.freeStatus.text.slice(0, 38) + (a.freeStatus.text.length > 38 ? '…' : '');
      fullDesc = a.freeStatus.text;
    } else {
      taskText = a.status === 'idle' ? 'idle' : a.status === 'offline' ? 'offline' : '—';
    }
    taskLabel.textContent = taskText;
    row.append(dot, name, taskLabel);
    if (fullDesc) {
      const tip = document.createElement('div');
      tip.className = 'agent-task-tooltip';
      tip.textContent = fullDesc;
      row.appendChild(tip);
    }
    list.appendChild(row);
  });
}

async function loadAgentStatus() {
  try {
    const res = await fetch('/api/agent-status');
    if (res.ok) {
      const data = await res.json();
      renderAgentStatus(data.agents || []);
    }
  } catch { /* degrade silently */ }
}

// Poll every 15 seconds
loadAgentStatus();
setInterval(loadAgentStatus, 15000);

setupLogin();
setupEvents();
setupMicButton();
if (state.user && state.token) init();

// Handle browser back/forward navigation between channels
window.addEventListener('popstate', (e) => {
  const id = e.state?.channel || location.pathname.match(/^\/channel\/(.+)$/)?.[1];
  if (id && state.channels.length) selectChannel(decodeURIComponent(id));
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
