# RCC Hub — Docker Compose Stack
#
# Usage:
#   cp .env.template .env && edit .env
#   docker compose up -d
#
# Services:
#   rcc-api       — Node.js RCC API server  (port 8789)
#   rcc-dashboard — Rust/WASM dashboard     (port 8788)
#   minio         — Optional S3-compatible object store (port 9000/9001)
#
# Profiles:
#   default      — rcc-api + rcc-dashboard
#   minio        — add MinIO sidecar (docker compose --profile minio up -d)

version: "3.9"

# ── Shared health check defaults ──────────────────────────────────────────────
x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:

  # ── RCC API (Node.js) ────────────────────────────────────────────────────────
  rcc-api:
    image: node:20-slim
    container_name: rcc-api
    restart: unless-stopped
    working_dir: /app
    command: ["node", "src/api/index.mjs"]
    ports:
      - "${RCC_PORT:-8789}:${RCC_PORT:-8789}"
    volumes:
      - .:/app:ro                        # mount source read-only
      - rcc-data:/app/data               # persist queue, agents, logs
      - rcc-env:/app/.env-secrets:ro     # env file mount (see .env.docker)
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Data paths inside container
      - QUEUE_PATH=/app/data/queue.json
      - AGENTS_PATH=/app/data/agents.json
      - EXEC_LOG_PATH=/app/data/exec.jsonl
      - BUS_LOG_PATH=/app/data/bus.jsonl
      - DEAD_LOG_PATH=/app/data/dead.jsonl
      - CALENDAR_PATH=/app/data/calendar.json
      - CONVERSATIONS_PATH=/app/data/conversations.json
      - BRAIN_STATE_PATH=/app/data/brain-state.json
      - LLM_REGISTRY_PATH=/app/data/llm-registry.json
      - PROJECTS_PATH=/app/data/projects.json
      - REPOS_PATH=/app/data/repos.json
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${RCC_PORT:-8789}/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      <<: *default-healthcheck
    networks:
      - rcc-net
    depends_on: []

  # ── RCC Dashboard (Rust binary serving static WASM) ──────────────────────────
  rcc-dashboard:
    image: debian:bookworm-slim
    container_name: rcc-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8788}:8788"
    volumes:
      - ./dist:/app/dist:ro              # pre-built WASM frontend
      - ./dashboard-server:/app/dashboard-server:ro  # Rust binary (pre-built)
    env_file:
      - .env
    environment:
      - RCC_API_URL=http://rcc-api:${RCC_PORT:-8789}
      - DASHBOARD_PORT=8788
      # Token stays server-side — never exposed to the browser
      - RCC_AGENT_TOKEN=${RCC_AGENT_TOKEN}
    command: ["/app/dashboard-server"]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8788/health"]
      <<: *default-healthcheck
    networks:
      - rcc-net
    depends_on:
      rcc-api:
        condition: service_healthy

  # ── MinIO (optional — S3-compatible object store) ────────────────────────────
  minio:
    profiles: ["minio"]
    image: minio/minio:latest
    container_name: rcc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-rcc-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9000/minio/health/live"]
      <<: *default-healthcheck
    networks:
      - rcc-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  rcc-data:
    name: rcc-hub-data
  rcc-env:
    name: rcc-hub-env
  minio-data:
    name: rcc-minio-data

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  rcc-net:
    name: rcc-network
    driver: bridge
