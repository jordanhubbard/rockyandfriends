# RCC Hub — nginx + Let's Encrypt reverse proxy
#
# Prerequisites:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d rcc.yourdomain.com
#
# After certbot runs it will modify this file and add SSL config automatically.
# This file provides the initial HTTP config for the ACME challenge.
#
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/rcc
#   sudo ln -s /etc/nginx/sites-available/rcc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d rcc.yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name rcc.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS (certbot will inject this automatically)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rcc.yourdomain.com;

    # SSL managed by certbot — paths inserted after running certbot
    # ssl_certificate /etc/letsencrypt/live/rcc.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/rcc.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/wasm;

    # RCC API
    location /api/ {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Health check (no auth needed)
    location /health {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Dashboard
    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/rcc-access.log;
    error_log  /var/log/nginx/rcc-error.log;
}
