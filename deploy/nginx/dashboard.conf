# Nginx config for RCC dashboard container
# Serves WASM static files, proxies /api and /bus to rcc-api

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WASM needs correct MIME type
    types {
        application/wasm wasm;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to rcc-api service
    location /api/ {
        proxy_pass http://rcc-api:8789/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE stream (no buffering)
    location /bus/ {
        proxy_pass http://rcc-api:8789/bus/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Health
    location /health {
        proxy_pass http://rcc-api:8789/health;
    }
}
