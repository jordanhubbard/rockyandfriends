<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQUIRREL BOUNCER 3000</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }
    #title {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #e94560;
      font: 900 2rem 'Segoe UI', sans-serif;
      text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
      z-index: 10;
      letter-spacing: 4px;
      white-space: nowrap;
      animation: pulse 2s infinite;
    }
    #stats {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #53d8fb;
      font: 1rem 'Segoe UI', sans-serif;
      text-shadow: 0 0 10px #53d8fb;
      z-index: 10;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
  </style>
</head>
<body>
  <div id="title">&#x1F43F; SQUIRREL BOUNCER 3000 &#x1F43F;</div>
  <canvas id="canvas"></canvas>
  <div id="stats">Bounces: <span id="bc">0</span> | Speed: <span id="sp">0</span> px/s</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bcEl = document.getElementById('bc');
const spEl = document.getElementById('sp');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// --- Draw squirrel from scratch using canvas paths ---
function drawSquirrel(ctx, scale, facing) {
  // facing: 1 = right, -1 = left
  ctx.save();
  ctx.scale(facing, 1);
  const s = scale;

  // Body (brown ellipse)
  ctx.beginPath();
  ctx.ellipse(0, 0, 22*s, 16*s, 0, 0, Math.PI*2);
  ctx.fillStyle = '#8B5C2A';
  ctx.fill();
  ctx.strokeStyle = '#5a3310'; ctx.lineWidth = 1.5*s; ctx.stroke();

  // Belly (lighter)
  ctx.beginPath();
  ctx.ellipse(2*s, 2*s, 12*s, 9*s, 0, 0, Math.PI*2);
  ctx.fillStyle = '#d4956a';
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(20*s, -6*s, 13*s, 12*s, -0.2, 0, Math.PI*2);
  ctx.fillStyle = '#8B5C2A';
  ctx.fill();
  ctx.strokeStyle = '#5a3310'; ctx.lineWidth = 1.5*s; ctx.stroke();

  // Eye
  ctx.beginPath();
  ctx.arc(26*s, -9*s, 3*s, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a1a';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(27*s, -10*s, 1*s, 0, Math.PI*2);
  ctx.fillStyle = 'white';
  ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.arc(31*s, -5*s, 2*s, 0, Math.PI*2);
  ctx.fillStyle = '#ff8080';
  ctx.fill();

  // Ear
  ctx.beginPath();
  ctx.moveTo(19*s, -15*s);
  ctx.lineTo(14*s, -24*s);
  ctx.lineTo(25*s, -20*s);
  ctx.closePath();
  ctx.fillStyle = '#8B5C2A';
  ctx.fill();
  ctx.strokeStyle = '#5a3310'; ctx.lineWidth = 1*s; ctx.stroke();
  // Inner ear
  ctx.beginPath();
  ctx.moveTo(20*s, -16*s);
  ctx.lineTo(16*s, -22*s);
  ctx.lineTo(23*s, -19*s);
  ctx.closePath();
  ctx.fillStyle = '#ff9999';
  ctx.fill();

  // Front legs
  ctx.beginPath();
  ctx.moveTo(10*s, 12*s);
  ctx.bezierCurveTo(12*s, 22*s, 6*s, 26*s, 4*s, 28*s);
  ctx.strokeStyle = '#8B5C2A'; ctx.lineWidth = 4*s; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(18*s, 10*s);
  ctx.bezierCurveTo(22*s, 20*s, 16*s, 24*s, 14*s, 28*s);
  ctx.strokeStyle = '#8B5C2A'; ctx.lineWidth = 4*s; ctx.stroke();

  // Back legs
  ctx.beginPath();
  ctx.moveTo(-10*s, 12*s);
  ctx.bezierCurveTo(-14*s, 22*s, -10*s, 28*s, -8*s, 30*s);
  ctx.strokeStyle = '#8B5C2A'; ctx.lineWidth = 5*s; ctx.stroke();

  // Bushy tail (the MAIN ATTRACTION)
  ctx.save();
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-18*s, 0);
    ctx.bezierCurveTo(-40*s - i*4*s, -10*s - i*3*s, -55*s - i*4*s, -30*s - i*4*s, -40*s - i*2*s, -45*s - i*4*s);
    ctx.bezierCurveTo(-28*s, -55*s, -10*s - i*3*s, -50*s, -15*s - i*2*s, -35*s);
    ctx.bezierCurveTo(-18*s, -25*s, -10*s, -15*s, -18*s, 0);
    ctx.closePath();
    const alpha = 0.7 - i * 0.15;
    ctx.fillStyle = `rgba(139, 92, 42, ${alpha})`;
    ctx.strokeStyle = '#5a3310';
    ctx.lineWidth = 1*s;
    ctx.fill();
    ctx.stroke();
  }
  // Tail tip (white/light)
  ctx.beginPath();
  ctx.arc(-38*s, -46*s, 6*s, 0, Math.PI*2);
  ctx.fillStyle = '#f0d8b0';
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ---- PARTICLES ----
const particles = [];
function burst(x, y) {
  const cols = ['#e94560','#53d8fb','#f5a623','#7ed321','#bd10e0','#fff'];
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 7 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, maxLife: 1,
      color: cols[Math.floor(Math.random()*cols.length)],
      size: Math.random()*8+2
    });
  }
}

// ---- TRAIL ----
const trail = [];

// ---- SQUIRREL STATE ----
let bounces = 0;
const sq = {
  x: window.innerWidth/2, y: window.innerHeight/2,
  vx: 5*(Math.random()<.5?1:-1), vy: 4.5*(Math.random()<.5?1:-1),
  rot: 0, scale: 1, scaleDir: 0.003,
  facing: 1 // 1=right, -1=left
};

const PAD_TOP = 90, PAD_BOT = 50, HALF = 40;

function update() {
  trail.push({x:sq.x, y:sq.y, rot:sq.rot, facing:sq.facing, scale:sq.scale});
  if (trail.length > 12) trail.shift();

  sq.x += sq.vx; sq.y += sq.vy;
  sq.rot += 0.04 * sq.vx;
  sq.scale += sq.scaleDir;
  if (sq.scale > 1.12 || sq.scale < 0.9) sq.scaleDir *= -1;
  sq.facing = sq.vx > 0 ? 1 : -1;

  let bounced = false;
  if (sq.x - HALF < 0)               { sq.x = HALF;                      sq.vx = Math.abs(sq.vx)*1.02; bounced=true; }
  if (sq.x + HALF > canvas.width)    { sq.x = canvas.width - HALF;       sq.vx = -Math.abs(sq.vx)*1.02; bounced=true; }
  if (sq.y - HALF < PAD_TOP)         { sq.y = HALF + PAD_TOP;             sq.vy = Math.abs(sq.vy)*1.02; bounced=true; }
  if (sq.y + HALF > canvas.height - PAD_BOT) { sq.y = canvas.height-HALF-PAD_BOT; sq.vy = -Math.abs(sq.vy)*1.02; bounced=true; }

  if (bounced) { bounces++; burst(sq.x, sq.y); }

  const maxSpd = 20;
  const spd = Math.hypot(sq.vx, sq.vy);
  if (spd > maxSpd) { sq.vx *= maxSpd/spd; sq.vy *= maxSpd/spd; }

  // update particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw trail
  trail.forEach((t, i) => {
    const a = (i/trail.length) * 0.35;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot);
    drawSquirrel(ctx, t.scale * 0.5 * (i/trail.length + 0.2), t.facing);
    ctx.restore();
  });

  // Draw particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 12; ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Draw squirrel (with glow)
  ctx.save();
  ctx.translate(sq.x, sq.y);
  ctx.rotate(sq.rot);
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#e94560';
  drawSquirrel(ctx, sq.scale, sq.facing);
  ctx.restore();

  // Stats
  const spd = Math.round(Math.hypot(sq.vx, sq.vy) * 60);
  bcEl.textContent = bounces;
  spEl.textContent = spd;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

// Click = teleport + boost
canvas.addEventListener('click', e => {
  sq.x = e.clientX; sq.y = e.clientY;
  sq.vx = (Math.random()*8+5) * (Math.random()<.5?1:-1);
  sq.vy = (Math.random()*8+5) * (Math.random()<.5?1:-1);
  burst(e.clientX, e.clientY);
});
</script>
</body>
</html>
